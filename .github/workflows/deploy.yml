name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push to Artifact Registry
        run: |
          BUILD_ID=$(gcloud builds submit --tag europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rivnox/website:${{ github.sha }} --async --format='value(id)')
          echo "Build started: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null)
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy rivnox-website \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rivnox/website:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080
